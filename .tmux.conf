set-option -g default-command fish
set-option -g mouse on
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
setw -g aggressive-resize on
set-option -sa terminal-overrides ",xterm*:Tc"
set -s set-clipboard external
set -as terminal-features ',xterm-256color:clipboard'

# Faster escape time for vim
set -sg escape-time 0

# ── Clean up stale clients on attach ───────────────────────────
# Each disconnect can leave a detached client holding the session; over
# time these pile up. On every attach, detach all OTHER clients (-a keeps
# the one just attaching) so there's only ever one live client. Uses the
# native tmux command directly (no run-shell) to avoid spawning a subshell.
set-hook -g client-attached 'detach-client -a'

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Big scrollback so long agent transcripts stay scrollable
set -g history-limit 50000

# ── Tab names: current git branch ──────────────────────────────
# The window label shows the git branch of the window's active pane
# (see window-status-format below, which derives it from
# pane_current_path). Falling back to the directory basename when the
# pane isn't inside a git repo. We turn OFF automatic-rename so tmux
# doesn't overwrite #W — the branch is rendered purely in the format
# string instead, so it stays live without needing a window name.
set -g automatic-rename off
set -g allow-rename off

# ── Agent activity awareness ───────────────────────────────────
# Flag windows (not currently focused) that produced new output, so you
# can tell which background agent did something without cycling through.
setw -g monitor-activity on
set -g visual-activity off
# Silence monitoring is opt-in per window: prefix + m toggles a "tell me
# when this agent goes quiet" alert (handy for spotting a finished run).
bind m if -F '#{monitor-silence}' \
  'setw monitor-silence 0 ; display "silence alert OFF"' \
  'setw monitor-silence 15 ; display "silence alert ON (15s)"'

# ── Tokyo Night theme ──────────────────────────────────────────
# bg #1a1b26  surface #292e42  fg #c0caf5  muted #565f89
# blue #7aa2f7  cyan #7dcfff  green #9ece6a  yellow #e0af68  red #f7768e
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: no session badge
set -g status-left ""

# Right: shortened workdir (home → ~) + cpu% + mem%
# The path is shortened with tmux's NATIVE #{s|...} substitution — no shell,
# no `echo|sed` pipeline (the old pipeline orphaned `sed` onto PID 1 as a
# zombie on every refresh). ^/root matches $HOME in the devenv container.
# cpu+mem come from a single pipe-free helper so tmux reaps it cleanly; the
# old `top -bn1 | awk` was both slow (~1-2s, overlapping across clients) and a
# pipeline (orphaned children → zombies).
set -g status-right-length 90
set -g status-right "#[fg=#565f89]▏#[fg=#7dcfff] #{s|^/root|~|:pane_current_path} #[fg=#565f89]▏#(~/.config/tmux/stat.sh)"

# Window tabs: index:branch, with ● for new activity and ○ for silence.
# The branch is computed from the window's active pane cwd; outside a
# repo it falls back to the directory basename.
set -g window-status-separator ""
set -g window-status-format "#[fg=#565f89] #I:#(~/.config/tmux/branch.sh '#{pane_current_path}')#{?window_activity_flag,#[fg=#e0af68] ●,}#{?window_silence_flag,#[fg=#9ece6a] ○,} "
set -g window-status-current-format "#[bg=#292e42,fg=#7aa2f7,bold] #I:#(~/.config/tmux/branch.sh '#{pane_current_path}')#{?window_zoomed_flag, ,} "
set -g window-status-activity-style "fg=#e0af68"
set -g window-status-bell-style "fg=#f7768e,bold"

# Pane borders: dim inactive, blue active, with a title strip on top
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status top
set -g pane-border-format "#[fg=#565f89] #P #{pane_current_command} "

# Messages and the copy-mode selection
set -g message-style "bg=#292e42,fg=#7dcfff,bold"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
